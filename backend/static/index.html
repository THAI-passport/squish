<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Squish — every PDF tool, on your own machine</title>
<meta name="description" content="Merge, split, compress, convert, OCR, protect and redact PDFs. Runs entirely on your own hardware; files are deleted the moment the download finishes.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
/* ---------------------------------------------------------------- theme --
   Brand: ink-navy ground, violet accent. Deliberately not Adobe red and not
   Yoink's clay orange -- this sits in the same family, different hue.
   Everything below is driven by these custom properties; to rebrand, change
   the accent and the two ground colours and nothing else. */
:root{
  --bg:#0d0f1a; --panel:#151827; --raise:#1e2235; --border:#2b3049;
  --text:#eceef7; --muted:#9aa0bd;
  /* --dim was #6b7192, which measured 3.69:1 on --panel -- below the 4.5:1
     WCAG AA threshold for body text. Raised to a measured 4.52:1. */
  --dim:#7b8190;
  --accent:#7c5cff; --accent-hi:#9d84ff; --accent-ink:#fff;
  /* White on --accent is only 4.35:1, so the primary button gets its own
     darker violet. Decorative uses keep the brighter --accent. */
  --accent-solid:#6b46e0;
  --ok:#3ecf8e; --err:#ff6b6b; --warn:#ffb020;
  --shadow:0 10px 40px rgba(0,0,0,.45);
  --r:14px;
}
[data-theme=light]{
  --bg:#f6f5fb; --panel:#fff; --raise:#f0eefb; --border:#e0ddf0;
  --text:#171a2b; --muted:#5f6484; --dim:#585a6b;  /* was #8e93ae = 3.03:1 */
  --shadow:0 10px 36px rgba(30,20,80,.10);
}
/* Respect the OS setting; vestibular disorders make the pop/slide animations
   genuinely unpleasant. */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;
    animation-iteration-count:1 !important; transition-duration:.01ms !important}
}
/* Visually hidden but announced by screen readers. */
.sr-only{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;
}
/* A visible focus ring everywhere. The default outline disappears against
   dark panels, which makes keyboard navigation guesswork. */
:focus-visible{outline:3px solid var(--accent-hi); outline-offset:2px; border-radius:4px}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--bg); color:var(--text);
  font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
}
/* Soft violet bloom behind everything. Pure CSS, no image request. */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(60rem 30rem at 12% -10%, color-mix(in srgb,var(--accent) 22%,transparent), transparent 60%),
    radial-gradient(50rem 26rem at 90% 0%, color-mix(in srgb,#2ad5c9 14%,transparent), transparent 60%);
}
.wrap{position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:0 20px 80px}
a{color:var(--accent-hi); text-decoration:none}

/* --------------------------------------------------------------- header -- */
header{display:flex; align-items:center; gap:14px; padding:22px 0 8px}
.brand{display:flex; align-items:center; gap:11px; cursor:pointer; background:none; border:0; padding:0; color:inherit; font:inherit}
.brand .mark{width:34px; height:34px; flex:none}
.brand b{font-size:21px; letter-spacing:-.02em; font-weight:800}
.brand span{color:var(--dim); font-size:12px; display:block; margin-top:-3px; letter-spacing:.06em; text-transform:uppercase}
.spacer{flex:1}
.iconbtn{
  width:38px; height:38px; border-radius:11px; border:1px solid var(--border);
  background:var(--panel); color:var(--muted); cursor:pointer; display:grid;
  place-items:center; font-size:16px; transition:.15s;
}
.iconbtn:hover{color:var(--text); border-color:var(--accent); transform:translateY(-1px)}

/* ----------------------------------------------------------------- hero -- */
.hero{text-align:center; padding:44px 0 30px}
.hero h1{font-size:clamp(30px,5.4vw,46px); line-height:1.08; margin:0 0 12px; letter-spacing:-.03em; font-weight:800}
.hero h1 em{font-style:normal; color:var(--accent-hi)}
.hero p{color:var(--muted); margin:0 auto; max-width:52ch; font-size:16px}
.privacy{
  display:inline-flex; align-items:center; gap:8px; margin-top:18px; padding:7px 14px;
  border:1px solid var(--border); border-radius:999px; background:var(--panel);
  color:var(--muted); font-size:12.5px;
}
.privacy b{color:var(--ok); font-weight:600}

/* ----------------------------------------------------------------- grid -- */
.search{
  width:100%; max-width:420px; margin:26px auto 0; display:block; padding:12px 16px;
  border-radius:12px; border:1px solid var(--border); background:var(--panel);
  color:var(--text); font-size:15px; outline:none; transition:.15s;
}
.search:focus{border-color:var(--accent); box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 18%,transparent)}
h2.group{
  font-size:12px; text-transform:uppercase; letter-spacing:.13em; color:var(--dim);
  margin:34px 0 12px; font-weight:700;
}
.grid{display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(232px,1fr))}
.tool{
  text-align:left; padding:16px; border-radius:var(--r); border:1px solid var(--border);
  background:var(--panel); color:inherit; cursor:pointer; font:inherit; transition:.16s;
  display:flex; flex-direction:column; gap:6px; position:relative;
}
.tool:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow)}
.tool .ic{font-size:20px; line-height:1}
.tool b{font-size:14.5px; font-weight:650}
.tool small{color:var(--muted); font-size:12.5px; line-height:1.45}
.tool.is-off{opacity:.55; cursor:not-allowed}
.tool.is-off:hover{transform:none; border-color:var(--border); box-shadow:none}
.tool .miss{
  position:absolute; top:10px; right:10px; font-size:10px; color:var(--warn);
  border:1px solid var(--warn); border-radius:6px; padding:1px 6px;
}

/* ---------------------------------------------------------------- panel -- */
.panel{
  background:var(--panel); border:1px solid var(--border); border-radius:18px;
  padding:24px; box-shadow:var(--shadow); animation:pop .22s ease-out;
}
@keyframes pop{from{opacity:0; transform:translateY(10px) scale(.99)}to{opacity:1; transform:none}}
.back{
  background:none; border:0; color:var(--muted); cursor:pointer; font:inherit;
  padding:6px 0; margin-bottom:6px; display:inline-flex; align-items:center; gap:7px;
}
.back:hover{color:var(--accent-hi)}
.panel h3{margin:2px 0 4px; font-size:22px; letter-spacing:-.02em}
.panel .sub{color:var(--muted); margin:0 0 20px; font-size:14px}

.drop{
  border:2px dashed var(--border); border-radius:var(--r); padding:34px 20px;
  text-align:center; cursor:pointer; transition:.16s; background:var(--raise);
  width:100%; color:inherit; font:inherit; display:block;
}
.drop:hover,.drop.over{border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,var(--raise))}
.drop .big{font-size:30px; margin-bottom:8px}
.drop b{display:block; font-size:15px}
.drop small{color:var(--muted)}

.files{list-style:none; margin:14px 0 0; padding:0; display:flex; flex-direction:column; gap:7px}
.files li{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px;
  background:var(--raise); border:1px solid var(--border); font-size:13.5px;
}
.files li.reorder{cursor:grab}
.files li.dragging{opacity:.4}
.files li.dropafter{box-shadow:0 2px 0 var(--accent)}
.files li.dropbefore{box-shadow:0 -2px 0 var(--accent)}
/* Thumbnail: fixed box so rows stay aligned whether the preview has rendered
   yet or fell back to an icon. */
.files li .thumb{
  flex:0 0 auto; width:34px; height:44px; border-radius:4px; overflow:hidden;
  display:grid; place-items:center; background:var(--panel);
  border:1px solid var(--border); color:var(--dim); font-size:18px;
}
.files li .thumb canvas,.files li .thumb img{width:100%; height:100%; object-fit:cover; display:block}
.files li .grip{flex:0 0 auto; color:var(--dim); cursor:grab; font-size:14px; user-select:none}
.files li .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.files li .sz{color:var(--dim); font-size:12px; font-variant-numeric:tabular-nums}
.files li button{background:none; border:0; color:var(--dim); cursor:pointer; font-size:15px; padding:0 2px}
.files li button:hover{color:var(--err)}
.files li .mv{color:var(--dim); cursor:pointer; font-size:13px}
@media (prefers-reduced-motion: reduce){.files li{transition:none}}

.fields{display:grid; gap:14px; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); margin-top:20px}

/* ------------------------------------------------------- page picker --- */
#pagePicker{margin-top:20px; border:1px solid var(--border); border-radius:12px;
  padding:14px; background:color-mix(in srgb,var(--raise) 55%,transparent)}
.pp-head{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
.pp-head h4{margin:0; font-size:14px}
.pp-actions{display:flex; align-items:center; gap:8px}
.pp-count{color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums}
.pp-btn{background:var(--raise); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:4px 10px; font-size:12px; cursor:pointer}
.pp-btn:hover{border-color:var(--accent)}
.pp-hint{color:var(--muted); font-size:12px; margin:8px 0 12px}
.pp-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr));
  gap:10px; max-height:420px; overflow:auto; padding:2px}
.pp-tile{position:relative; border:2px solid var(--border); border-radius:8px;
  background:var(--panel); cursor:pointer; padding:0; overflow:hidden;
  aspect-ratio:0.77; display:grid; grid-template-rows:1fr auto}
.pp-tile:focus-visible{outline:2px solid var(--accent-hi); outline-offset:2px}
.pp-tile .pg-canvas{width:100%; height:100%; object-fit:contain; display:block;
  background:var(--panel)}
.pp-tile .pg-ph{display:grid; place-items:center; color:var(--dim); font-size:20px}
.pp-tile .pg-num{font-size:11px; text-align:center; padding:2px 0;
  color:var(--muted); background:var(--raise); font-variant-numeric:tabular-nums}
/* selected (act-on) */
.pp-tile.sel{border-color:var(--accent)}
.pp-tile.sel .pg-num{background:var(--accent-solid); color:#fff}
/* remove-mode selection reads as danger, not approval */
.pp-tile.rm{border-color:var(--err)}
.pp-tile.rm .pg-num{background:var(--err); color:#fff}
.pp-tile.rm .pg-canvas{opacity:.45}
.pp-tile .pg-badge{position:absolute; top:4px; right:5px; font-size:11px;
  line-height:1; padding:2px 5px; border-radius:20px; background:var(--accent-solid);
  color:#fff; font-variant-numeric:tabular-nums}
.pp-tile.rm .pg-badge{background:var(--err)}
/* order mode: draggable, shows position badge */
.pp-tile.order{cursor:grab}
.pp-tile.dragging{opacity:.4}
.pp-tile.dropbefore{box-shadow:-3px 0 0 var(--accent)}
.pp-tile.dropafter{box-shadow:3px 0 0 var(--accent)}
.pp-tile.excluded{opacity:.35}
.pp-tile.excluded .pg-badge{display:none}
@media (prefers-reduced-motion: reduce){.pp-tile{transition:none}}
.field{display:flex; flex-direction:column; gap:5px}
.field.wide{grid-column:1/-1}
.field label{font-size:12.5px; color:var(--muted); font-weight:600}
.field .hint{font-size:11.5px; color:var(--dim)}
input[type=text],input[type=password],input[type=number],select,textarea{
  padding:10px 12px; border-radius:10px; border:1px solid var(--border);
  background:var(--raise); color:var(--text); font:inherit; font-size:14px; outline:none; width:100%;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:84px; resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px}
input[type=color]{width:100%; height:40px; padding:3px; border-radius:10px; border:1px solid var(--border); background:var(--raise); cursor:pointer}
.check{flex-direction:row; align-items:center; gap:9px}
.check input{width:17px; height:17px; accent-color:var(--accent); cursor:pointer}
.check label{color:var(--text); font-weight:500; cursor:pointer}

.go{
  margin-top:22px; width:100%; padding:14px; border-radius:12px; border:0; cursor:pointer;
  background:var(--accent-solid); color:var(--accent-ink); font:inherit; font-size:15.5px;
  font-weight:700; transition:.15s;
}
.go:hover:not(:disabled){background:var(--accent); transform:translateY(-1px)}
.go:disabled{opacity:.45; cursor:not-allowed; transform:none}

.bar{height:4px; border-radius:99px; background:var(--raise); overflow:hidden; margin-top:14px; display:none}
.bar.on{display:block}
.bar i{display:block; height:100%; width:30%; border-radius:99px; background:var(--accent); animation:slide 1.1s ease-in-out infinite}
@keyframes slide{0%{margin-left:-30%}100%{margin-left:100%}}

.result{margin-top:18px; padding:18px; border-radius:var(--r); border:1px solid var(--ok);
  background:color-mix(in srgb,var(--ok) 9%,transparent); display:none; animation:pop .22s}
.result.on{display:block}
.result b{display:block; margin-bottom:4px}
.result small{color:var(--muted)}
.result a{
  display:inline-block; margin-top:12px; padding:10px 18px; border-radius:10px;
  background:var(--ok); color:#062b1a; font-weight:700; font-size:14px;
}

/* --------------------------------------------------------------- toasts -- */
#toasts{position:fixed; right:18px; bottom:18px; z-index:50; display:flex; flex-direction:column; gap:9px; max-width:min(380px,90vw)}
.toast{
  padding:12px 16px; border-radius:12px; background:var(--panel); color:var(--text);
  border:1px solid var(--border); border-left:3px solid var(--accent);
  box-shadow:var(--shadow); font-size:13.5px; animation:pop .2s;
}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--err)}

footer{text-align:center; color:var(--dim); font-size:12px; padding:44px 0 0}
footer code{font-family:ui-monospace,Menlo,monospace}
@media(max-width:560px){
  .wrap{padding:0 14px 60px}
  .grid{grid-template-columns:1fr}
  .panel{padding:18px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <button class="brand" onclick="home()" aria-label="Squish — back to all tools">
    <svg class="mark" viewBox="0 0 48 48" fill="none" aria-hidden="true" focusable="false">
      <!-- Three sheets compressed toward the middle: the whole product in one mark. -->
      <rect x="9" y="5"  width="30" height="9" rx="3" fill="currentColor" opacity=".30"/>
      <rect x="5" y="18" width="38" height="12" rx="4" fill="#7c5cff"/>
      <rect x="9" y="34" width="30" height="9" rx="3" fill="currentColor" opacity=".30"/>
      <path d="M24 15.5v-4M20.5 13.5 24 10l3.5 3.5M24 32.5v4M20.5 34.5 24 38l3.5-3.5"
            stroke="#9d84ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span style="text-align:left"><b>Squish</b><span>PDF toolkit</span></span>
  </button>
  <div class="spacer"></div>
  <button class="iconbtn" id="themeBtn" onclick="toggleTheme()"
          aria-label="Switch to light theme"><span aria-hidden="true">◐</span></button>
</header>

<!-- ------------------------------------------------------------ home ---- -->
<section id="home">
  <div class="hero">
    <h1>Every PDF tool.<br><em>None of your files leave.</em></h1>
    <p>Merge, split, compress, convert, OCR, protect and redact — running on hardware you control.</p>
    <div class="privacy"><span aria-hidden="true">🔒</span> <span>Processed in memory, then <b>deleted the instant your download finishes</b></span></div>
    <label class="sr-only" for="search">Search tools</label>
    <input class="search" id="search" type="search" placeholder="Search tools…"
           oninput="render()" autocomplete="off">
  </div>
  <!-- Result count is announced politely so screen reader users learn the
       search narrowed things, which is invisible to them otherwise. -->
  <p class="sr-only" role="status" aria-live="polite" id="searchStatus"></p>
  <div id="groups"></div>
</section>

<!-- ------------------------------------------------------------ tool ---- -->
<section id="tool" hidden>
  <button class="back" onclick="home()"><span aria-hidden="true">←</span> All tools</button>
  <div class="panel">
    <!-- tabindex=-1 so focus can be moved here when the panel opens; without
         it a keyboard user stays parked on the tool grid behind. -->
    <h3 id="tName" tabindex="-1"></h3>
    <p class="sub" id="tBlurb"></p>

    <!-- A real <button>: focusable, Enter/Space activated, announced as a
         control. Previously a <div onclick> -- invisible to the keyboard. -->
    <button type="button" class="drop" id="drop">
      <span class="big" aria-hidden="true">📄</span>
      <b>Drop files here or click to browse</b>
      <small id="dropHint"></small>
    </button>
    <input type="file" id="picker" class="sr-only" tabindex="-1" aria-hidden="true">

    <h4 class="sr-only" id="filesHeading">Selected files</h4>
    <ul class="files" id="fileList" aria-labelledby="filesHeading"></ul>
    <p class="sr-only" role="status" aria-live="polite" id="fileStatus"></p>

    <div class="fields" id="fields"></div>

    <!-- Visual page picker: populated for single-PDF tools that carry a
         `pages` field (split, remove-pages, reorder, rotate, crop, …). Empty
         and hidden otherwise. -->
    <section id="pagePicker" hidden aria-labelledby="ppHeading">
      <div class="pp-head">
        <h4 id="ppHeading"></h4>
        <div class="pp-actions">
          <span class="pp-count" id="ppCount"></span>
          <button type="button" class="pp-btn" id="ppAll"></button>
          <button type="button" class="pp-btn" id="ppNone">Clear</button>
        </div>
      </div>
      <p class="pp-hint" id="ppHint"></p>
      <div class="pp-grid" id="ppGrid" role="listbox" aria-multiselectable="true"></div>
    </section>

    <button class="go" id="go" onclick="submit()" disabled>Select a file to begin</button>
    <div class="bar" id="bar" role="progressbar" aria-label="Processing"><i></i></div>
    <!-- The result appears without a page change, so it must announce itself. -->
    <div class="result" id="result" role="status" aria-live="polite" tabindex="-1"></div>
  </div>
</section>

<footer>
  <span id="ver">connecting…</span> · stateless · <code>GET /api/tools</code>
</footer>
</div>
<div id="toasts" aria-live="polite" aria-relevant="additions"></div>

<script>
'use strict';

/* ------------------------------------------------------------- state --- */
let TOOLS = [], LIMITS = {}, current = null, files = [];

/* ------------------------------------------------------ pdf.js loader --- */
// Vendored, not from a CDN. If the files are not present (nobody ran
// fetch-pdfjs.sh) the load fails silently and thumbnails degrade to an icon --
// pdfReady stays a rejected/absent promise and previewPdf() bails. No document
// bytes ever leave the browser; pdf.js renders locally.
let pdfReady = null;
function loadPdfjs(){
  if(pdfReady) return pdfReady;
  pdfReady = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    // Served from the static mount, which is rooted at "/" (StaticFiles on "/"),
    // so the on-disk backend/static/vendor/ is reached at /vendor/, not /static/.
    s.src = '/vendor/pdf.min.js';
    s.onload = () => {
      if(window.pdfjsLib){
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = '/vendor/pdf.worker.min.js';
        resolve(window.pdfjsLib);
      } else { reject(new Error('pdfjsLib missing')); }
    };
    s.onerror = () => reject(new Error('pdf.js not vendored'));
    document.head.append(s);
  });
  return pdfReady;
}

// Render the first page of a File into a small canvas. Thumbnails render in a
// zone so slow files never block the UI, and any failure just leaves the icon.
async function previewPdf(file, box){
  let lib;
  try { lib = await loadPdfjs(); } catch { return; }
  try {
    const buf = await file.arrayBuffer();
    const doc = await lib.getDocument({data: buf}).promise;
    const page = await doc.getPage(1);
    const vp0 = page.getViewport({scale: 1});
    // Fit the 34x44 box, capped by devicePixelRatio for crispness.
    const scale = Math.min(34 / vp0.width, 44 / vp0.height) * (window.devicePixelRatio || 1);
    const vp = page.getViewport({scale});
    const canvas = document.createElement('canvas');
    canvas.width = Math.ceil(vp.width); canvas.height = Math.ceil(vp.height);
    await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
    box.textContent = ''; box.append(canvas);
    doc.destroy();
  } catch { /* keep the icon */ }
}

/* --------------------------------------------------- page picker --- */
// A per-page thumbnail grid for single-PDF tools that carry a `pages` field.
// Three modes come from the registry's `picker` attribute:
//   select : a set of pages to act on   (split, rotate, crop, render, ...)
//   remove : same, styled as deletion   (remove-pages)
//   order  : a sequence, drag to arrange (organize / reorder)
// The grid and the text box stay in sync BOTH ways: click/drag rewrites the
// box, and typing in the box re-highlights the grid. The text box is never
// removed -- it remains the authoritative value on submit and the accessible
// path for keyboard users.
const PP_MAX_AUTO = 600;   // above this, don't auto-render hundreds of canvases
let pp = null;

function ppField(){
  if(!current || current.multi) return null;
  return (current.fields || []).find(f => f.picker);
}

function compressRanges(nums){
  nums = [...new Set(nums)].sort((a, b) => a - b);
  const out = []; let i = 0;
  while(i < nums.length){
    let j = i;
    while(j + 1 < nums.length && nums[j + 1] === nums[j] + 1) j++;
    out.push(i === j ? `${nums[i]}` : `${nums[i]}-${nums[j]}`);
    i = j + 1;
  }
  return out.join(',');
}

// Lenient parse for live typing: ignore junk rather than throwing (the server
// still validates strictly on submit). Preserves order for the `order` mode.
function parseSpecLoose(spec, total){
  const out = [];
  for(let chunk of (spec || '').split(',')){
    chunk = chunk.trim(); if(!chunk) continue;
    const m = chunk.match(/^(\d+)?\s*-\s*(\d+)?$/);
    if(m){
      if(!m[1] && !m[2]) continue;
      let s = m[1] ? +m[1] : 1, e = m[2] ? +m[2] : total;
      if(s < 1) s = 1; if(e > total) e = total; if(s > e) continue;
      for(let k = s; k <= e; k++) out.push(k);
    }else if(/^\d+$/.test(chunk)){
      const v = +chunk; if(v >= 1 && v <= total) out.push(v);
    }
  }
  return out;
}

function teardownPicker(){
  const sec = document.getElementById('pagePicker');
  if(sec){ sec.hidden = true; }
  document.getElementById('ppGrid').innerHTML = '';
  if(pp){
    if(pp.input && pp._onText) pp.input.removeEventListener('input', pp._onText);
    try { pp.io && pp.io.disconnect(); } catch {}
    try { pp.doc && pp.doc.destroy(); } catch {}
  }
  pp = null;
}

// Decide whether the picker should be shown and (re)build it. Fire-and-forget
// from drawFiles; safe to call on every file change.
async function syncPagePicker(){
  const field = ppField();
  if(!field || files.length !== 1 || !isPdf(files[0])){ teardownPicker(); return; }
  if(pp && pp.file === files[0] && pp.field === field.name) return;  // already built
  await buildPagePicker(field, files[0]);
}

async function buildPagePicker(field, file){
  teardownPicker();
  let lib; try { lib = await loadPdfjs(); } catch { return; }   // no pdf.js -> box still works
  let doc;
  try { doc = await lib.getDocument({data: await file.arrayBuffer()}).promise; }
  catch { return; }
  // A late file swap could have happened while we awaited; bail if stale.
  if(files[0] !== file){ try { doc.destroy(); } catch {} return; }

  const total = doc.numPages;
  const input = document.getElementById('f_' + field.name);
  const mode = field.picker;  // select | remove | order
  pp = {file, doc, total, mode, field: field.name, input,
        tiles: new Map(), sel: new Set(), order: [], syncing: false, io: null};

  // Seed state from whatever is already in the text box.
  const parsed = parseSpecLoose(input ? input.value : '', total);
  if(mode === 'order'){
    const seq = parsed.length ? parsed : Array.from({length: total}, (_, i) => i + 1);
    const inSeq = new Set(seq);
    const rest = Array.from({length: total}, (_, i) => i + 1).filter(n => !inSeq.has(n));
    pp.order = seq.map(n => ({n, on: true})).concat(rest.map(n => ({n, on: false})));
  }else{
    pp.sel = new Set(parsed);
  }

  document.getElementById('ppHeading').textContent =
    mode === 'order' ? 'Arrange pages'
    : mode === 'remove' ? 'Pages to remove' : 'Choose pages';
  document.getElementById('ppHint').textContent =
    mode === 'order'
      ? 'Drag to reorder. Click a page to keep or drop it. The box above stays in sync.'
      : mode === 'remove'
      ? 'Click pages to mark them for removal — or type ranges above. Both stay in sync.'
      : 'Click pages to select them — or type ranges above. Both stay in sync.';

  const allBtn = document.getElementById('ppAll');
  const noneBtn = document.getElementById('ppNone');
  allBtn.textContent = mode === 'order' ? 'Reset order' : 'Select all';
  noneBtn.hidden = mode === 'order';
  allBtn.onclick = () => {
    if(mode === 'order'){
      pp.order = Array.from({length: total}, (_, i) => ({n: i + 1, on: true}));
      buildTiles();
    }else{
      pp.sel = new Set(Array.from({length: total}, (_, i) => i + 1));
      renderTiles();
    }
    writeFromPicker();
  };
  noneBtn.onclick = () => { pp.sel.clear(); renderTiles(); writeFromPicker(); };

  pp.io = new IntersectionObserver(entries => {
    for(const e of entries){
      if(e.isIntersecting){
        const t = e.target; pp.io.unobserve(t);
        renderPageThumb(pp.doc, +t.dataset.n, t.querySelector('.pg-holder'));
      }
    }
  }, {root: document.getElementById('ppGrid'), rootMargin: '250px'});

  const sec = document.getElementById('pagePicker');
  sec.hidden = false;

  if(total > PP_MAX_AUTO){
    // Rendering hundreds of pages is heavy; make the user opt in but keep the
    // text box (and its sync) fully working meanwhile.
    const grid = document.getElementById('ppGrid');
    grid.innerHTML = '';
    const note = document.createElement('button');
    note.type = 'button'; note.className = 'pp-btn';
    note.textContent = `Show thumbnails for ${total} pages`;
    note.onclick = () => buildTiles();
    grid.append(note);
  }else{
    buildTiles();
  }

  pp._onText = () => onPickerText();
  if(input) input.addEventListener('input', pp._onText);
  updateCount();
}

function makeTile(n){
  const t = document.createElement('button');
  t.type = 'button'; t.className = 'pp-tile'; t.dataset.n = n;
  t.setAttribute('role', 'option');
  t.setAttribute('aria-label', `Page ${n}`);
  t.innerHTML =
    '<div class="pg-holder pg-ph"><span aria-hidden="true">📄</span></div>' +
    '<span class="pg-num"></span><span class="pg-badge" aria-hidden="true"></span>';
  t.querySelector('.pg-num').textContent = n;
  t.onclick = () => onTileClick(n);
  pp.tiles.set(n, t);
  pp.io.observe(t);
  return t;
}

function buildTiles(){
  const grid = document.getElementById('ppGrid');
  grid.innerHTML = ''; pp.tiles.clear();
  const seq = pp.mode === 'order'
    ? pp.order.map(o => o.n)
    : Array.from({length: pp.total}, (_, i) => i + 1);
  for(const n of seq) grid.append(makeTile(n));
  if(pp.mode === 'order') wireOrderDnD();
  renderTiles();
}

async function renderPageThumb(doc, n, holder){
  try{
    const page = await doc.getPage(n);
    const vp0 = page.getViewport({scale: 1});
    const scale = Math.min(150 / vp0.width, 200 / vp0.height) * (window.devicePixelRatio || 1);
    const vp = page.getViewport({scale});
    const c = document.createElement('canvas');
    c.className = 'pg-canvas';
    c.width = Math.ceil(vp.width); c.height = Math.ceil(vp.height);
    await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
    holder.classList.remove('pg-ph'); holder.textContent = ''; holder.append(c);
  }catch{ /* leave the icon */ }
}

function renderTiles(){
  if(!pp) return;
  if(pp.mode === 'order'){
    let pos = 0;
    for(const o of pp.order){
      const t = pp.tiles.get(o.n); if(!t) continue;
      t.classList.add('order');
      t.classList.toggle('excluded', !o.on);
      t.querySelector('.pg-badge').textContent = o.on ? String(++pos) : '';
      t.setAttribute('aria-selected', o.on ? 'true' : 'false');
    }
  }else{
    const cls = pp.mode === 'remove' ? 'rm' : 'sel';
    for(const [n, t] of pp.tiles){
      const on = pp.sel.has(n);
      t.classList.toggle(cls, on);
      t.querySelector('.pg-badge').textContent =
        on ? (pp.mode === 'remove' ? '✕' : '✓') : '';
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    }
  }
  updateCount();
}

function onTileClick(n){
  if(pp.mode === 'order'){
    const o = pp.order.find(x => x.n === n); if(o) o.on = !o.on;
  }else{
    if(pp.sel.has(n)) pp.sel.delete(n); else pp.sel.add(n);
  }
  renderTiles(); writeFromPicker();
}

// Grid -> text box.
function writeFromPicker(){
  if(!pp || !pp.input) return;
  let val;
  if(pp.mode === 'order'){
    const seq = pp.order.filter(o => o.on).map(o => o.n);
    const identity = seq.length === pp.total && seq.every((n, i) => n === i + 1);
    val = identity ? '' : seq.join(',');
  }else{
    const nums = [...pp.sel];
    // For select tools blank means "all", so collapse a full selection to blank.
    val = (pp.mode !== 'remove' && nums.length === pp.total) ? '' : compressRanges(nums);
  }
  pp.syncing = true; pp.input.value = val; pp.syncing = false;
  updateCount();
}

// Text box -> grid.
function onPickerText(){
  if(!pp || pp.syncing) return;
  const parsed = parseSpecLoose(pp.input.value, pp.total);
  if(pp.mode === 'order'){
    const seq = parsed.length ? parsed : Array.from({length: pp.total}, (_, i) => i + 1);
    const inSeq = new Set(seq);
    const rest = Array.from({length: pp.total}, (_, i) => i + 1).filter(n => !inSeq.has(n));
    pp.order = seq.map(n => ({n, on: true})).concat(rest.map(n => ({n, on: false})));
    if(pp.tiles.size) buildTiles();
  }else{
    pp.sel = new Set(parsed);
    if(pp.tiles.size) renderTiles();
  }
  updateCount();
}

function wireOrderDnD(){
  let from = null;
  for(const [n, t] of pp.tiles){
    t.draggable = true;
    t.addEventListener('dragstart', ev => {
      from = n; t.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'move';
      ev.dataTransfer.setData('text/plain', String(n));
    });
    t.addEventListener('dragend', () => {
      from = null;
      pp.tiles.forEach(el => el.classList.remove('dragging', 'dropbefore', 'dropafter'));
    });
    t.addEventListener('dragover', ev => {
      ev.preventDefault();
      if(from === null || from === n) return;
      const before = ev.clientX < t.getBoundingClientRect().left + t.offsetWidth / 2;
      t.classList.toggle('dropbefore', before);
      t.classList.toggle('dropafter', !before);
    });
    t.addEventListener('dragleave', () => t.classList.remove('dropbefore', 'dropafter'));
    t.addEventListener('drop', ev => {
      ev.preventDefault();
      if(from === null) return;
      const before = ev.clientX < t.getBoundingClientRect().left + t.offsetWidth / 2;
      reorderOrder(from, n, before); from = null;
    });
  }
}

function reorderOrder(fromN, toN, before){
  const arr = pp.order;
  const fi = arr.findIndex(o => o.n === fromN);
  const [it] = arr.splice(fi, 1);
  let ti = arr.findIndex(o => o.n === toN);
  if(!before) ti += 1;
  arr.splice(ti, 0, it);
  buildTiles(); writeFromPicker();
  announce(`Moved page ${fromN}`);
}

function updateCount(){
  if(!pp) return;
  const el = document.getElementById('ppCount');
  if(pp.mode === 'order'){
    el.textContent = `${pp.order.filter(o => o.on).length}/${pp.total} kept`;
  }else{
    const n = pp.sel.size;
    el.textContent = pp.mode === 'remove'
      ? `${n} to remove`
      : (n ? `${n} selected` : `all ${pp.total}`);
  }
}

/* ------------------------------------------------------------- theme --- */
// Only UI preferences go in localStorage. No document data, ever.
(function initTheme(){
  const saved = localStorage.getItem('squish-theme');
  const sys = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  document.documentElement.dataset.theme = saved || sys;
})();
function toggleTheme(){
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('squish-theme', next);
  syncThemeLabel();
}
function syncThemeLabel(){
  const dark = document.documentElement.dataset.theme === 'dark';
  document.getElementById('themeBtn')
    .setAttribute('aria-label', `Switch to ${dark ? 'light' : 'dark'} theme`);
}

/* ------------------------------------------------------------ toasts --- */
function toast(msg, kind=''){
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  // Errors interrupt; successes wait their turn. Using assertive for both
  // would make routine confirmations cut off whatever is being read.
  el.setAttribute('role', kind === 'err' ? 'alert' : 'status');
  el.textContent = msg;
  document.getElementById('toasts').append(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = '.3s'; }, kind==='err'?6000:3200);
  setTimeout(() => el.remove(), kind==='err'?6400:3600);
}

const ICONS = {
  'merge':'🧩','split':'✂️','remove-pages':'🗑️','organize':'🔀','rotate':'🔄',
  'compress':'🗜️','repair':'🩹','ocr':'🔍','jpg-to-pdf':'🖼️','office-to-pdf':'📊',
  'pdf-to-jpg':'📸','pdf-to-word':'📝','pdf-to-excel':'📈','pdf-to-powerpoint':'📽️',
  'pdf-to-pdfa':'🏛️','pdf-to-markdown':'⌨️','watermark':'💧','page-numbers':'#️⃣',
  'crop':'⛶','protect':'🔐','unlock':'🔓','redact':'🖍️','compare':'⚖️'
};

/* -------------------------------------------------------------- boot --- */
async function boot(){
  try{
    const r = await fetch('/api/tools');
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    TOOLS = d.tools; LIMITS = d.limits;
    document.getElementById('ver').textContent = 'v' + d.version;
    render();
  }catch(e){
    document.getElementById('ver').textContent = 'offline';
    toast('Cannot reach the server: ' + e.message, 'err');
  }
}

/* The tool grid is generated from the server registry, so adding a tool in
   tools.py makes it appear here with no frontend change. */
function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const hit = TOOLS.filter(t => !q ||
    (t.name + ' ' + t.blurb + ' ' + t.group).toLowerCase().includes(q));
  const groups = [...new Set(hit.map(t => t.group))];
  const box = document.getElementById('groups');
  box.innerHTML = '';
  if(!hit.length){ box.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">No tool matches that.</p>'; return; }
  for(const g of groups){
    const h = document.createElement('h2'); h.className = 'group'; h.textContent = g;
    const grid = document.createElement('div'); grid.className = 'grid';
    for(const t of hit.filter(x => x.group === g)){
      const b = document.createElement('button');
      b.className = 'tool';
      b.id = 'tool-' + t.key;
      // aria-disabled rather than the disabled attribute: a disabled button is
      // skipped by the keyboard entirely, so a screen reader user would never
      // discover the tool exists, let alone why it is unavailable.
      if(!t.available){
        b.setAttribute('aria-disabled', 'true');
        b.classList.add('is-off');
      }
      b.innerHTML = `<span class="ic" aria-hidden="true">${ICONS[t.key] || '📄'}</span>
        <b></b><small></small>
        ${t.available ? '' : `<span class="miss" aria-hidden="true">needs ${t.needs}</span>`}`;
      b.querySelector('b').textContent = t.name;
      b.querySelector('small').textContent = t.blurb;
      if(!t.available){
        const why = document.createElement('span');
        why.className = 'sr-only';
        why.textContent = `Unavailable: this build has no ${t.needs} installed.`;
        b.append(why);
      }
      b.onclick = () => {
        if(!t.available){ toast(`${t.name} needs ${t.needs}, which this build does not include.`, 'err'); return; }
        open_(t.key);
      };
      grid.append(b);
    }
    box.append(h, grid);
  }
  document.getElementById('searchStatus').textContent =
    `${hit.length} tool${hit.length === 1 ? '' : 's'} shown`;
}

/* ------------------------------------------------------- tool screen --- */
function open_(key){
  teardownPicker();
  current = TOOLS.find(t => t.key === key);
  files = [];
  document.getElementById('home').hidden = true;
  document.getElementById('tool').hidden = false;
  document.getElementById('tName').textContent = current.name;
  document.getElementById('tBlurb').textContent = current.blurb;
  document.getElementById('dropHint').textContent =
    `${current.multi ? 'One or more' : 'One'} file · ${current.accept.replaceAll(',', ' ')} · up to ${LIMITS.max_upload_mb} MB`;

  const picker = document.getElementById('picker');
  picker.accept = current.accept;
  picker.multiple = !!current.multi;
  picker.value = '';

  buildFields();
  refreshOutputName();
  drawFiles();
  document.getElementById('result').className = 'result';
  const motion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  scrollTo({top:0, behavior: motion ? 'auto' : 'smooth'});
  location.hash = key;
  // Move focus into the panel, otherwise a keyboard user is still on the grid
  // behind and has to tab through every tool to reach the file picker.
  document.getElementById('tName').focus({preventScroll:true});
}

function home(){
  teardownPicker();
  const last = current && current.key;
  current = null; files = [];
  document.getElementById('home').hidden = false;
  document.getElementById('tool').hidden = true;
  history.replaceState(null, '', location.pathname);
  // Return focus to the tool that was opened, not to the top of the document.
  const back = last && document.getElementById('tool-' + last);
  if(back) back.focus({preventScroll:true});
}

function buildFields(){
  const box = document.getElementById('fields');
  box.innerHTML = '';
  for(const f of current.fields){
    const d = document.createElement('div');
    d.className = 'field' + (['textarea','text'].includes(f.kind) ? ' wide' : '');
    const id = 'f_' + f.name;
    if(f.kind === 'checkbox'){
      d.className = 'field check';
      d.innerHTML = `<input type="checkbox" id="${id}"><label for="${id}"></label>`;
      d.querySelector('label').textContent = f.label;
    }else{
      const lab = document.createElement('label');
      lab.htmlFor = id; lab.textContent = f.label;
      d.append(lab);
      let el;
      if(f.kind === 'select'){
        el = document.createElement('select');
        for(const [v, t] of f.options){
          const o = document.createElement('option');
          o.value = v; o.textContent = t;
          if(String(f.default) === String(v)) o.selected = true;
          el.append(o);
        }
      }else if(f.kind === 'textarea'){
        el = document.createElement('textarea');
      }else{
        el = document.createElement('input');
        el.type = {number:'number', password:'password', color:'color'}[f.kind] || 'text';
        if(f.min !== undefined) el.min = f.min;
        if(f.max !== undefined) el.max = f.max;
        if(f.step !== undefined) el.step = f.step;
      }
      el.id = id;
      if(f.placeholder) el.placeholder = f.placeholder;
      if(f.default !== undefined) el.value = f.default;
      // The output-name field auto-fills from the file list until the user
      // takes it over. Mark it "touched" on the first manual keystroke.
      if(f.name === 'output_name'){
        el.addEventListener('input', () => { el.dataset.touched = '1'; });
      }
      d.append(el);
      if(f.help){
        const h = document.createElement('span');
        h.className = 'hint'; h.textContent = f.help;
        d.append(h);
      }
    }
    box.append(d);
  }
}

/* --------------------------------------------------------- file input --- */
const drop = document.getElementById('drop');
const picker = document.getElementById('picker');
drop.onclick = () => picker.click();
picker.onchange = () => { addFiles(picker.files); picker.value = ''; };
['dragenter','dragover'].forEach(e =>
  drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(e =>
  drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', ev => addFiles(ev.dataTransfer.files));

function addFiles(list){
  const incoming = [...list];
  if(!incoming.length) return;
  const cap = LIMITS.max_upload_mb * 1024 * 1024;
  for(const f of incoming){
    if(f.size > cap){ toast(`${f.name} is over the ${LIMITS.max_upload_mb} MB limit`, 'err'); continue; }
    // Single-file tools replace rather than append, which is what a user
    // expects when they drop a second file onto e.g. Compress.
    if(!current.multi) files = [f]; else files.push(f);
  }
  refreshOutputName();
  drawFiles();
}

function isPdf(f){ return /\.pdf$/i.test(f.name) || f.type === 'application/pdf'; }

// Move item from -> to in `files`, keeping the array the single source of truth.
function moveFile(from, to){
  if(to < 0 || to >= files.length || from === to) return;
  const [it] = files.splice(from, 1);
  files.splice(to, 0, it);
  refreshOutputName();
  drawFiles();
}

let dragFrom = null;

// Smart default output name from the input stems, mirroring the server-side
// fallback in tools.py so the field just previews what the backend would pick.
function smartOutputName(){
  const stems = files.map(f => f.name.replace(/\.[^.]+$/, '').trim()).filter(Boolean);
  if(!stems.length) return '';
  if(stems.length === 1) return stems[0];
  if(stems.length === 2) return `${stems[0]}+${stems[1]}`;
  return `${stems[0]}+${stems.length - 1}-more`;
}

// Keep the output-name field in step with the file list until the user types
// their own value (dataset.touched), after which we never clobber it.
function refreshOutputName(){
  const el = document.getElementById('f_output_name');
  if(!el) return;
  const def = smartOutputName();
  el.placeholder = def || 'output name';
  if(el.dataset.touched !== '1') el.value = def;
}

function drawFiles(){
  const ul = document.getElementById('fileList');
  ul.innerHTML = '';
  files.forEach((f, i) => {
    const li = document.createElement('li');
    if(current.multi) li.classList.add('reorder');
    li.innerHTML = `
      ${current.multi ? '<span class="grip" aria-hidden="true">⋮⋮</span>' : ''}
      <span class="thumb" aria-hidden="true">📄</span>
      ${current.multi ? '<button class="mv" type="button"><span aria-hidden="true">↑</span></button>' : ''}
      <span class="nm"></span><span class="sz"></span>
      <button type="button" class="rm"><span aria-hidden="true">✕</span></button>`;
    li.querySelector('.nm').textContent = `${i + 1}. ${f.name}`;
    li.querySelector('.sz').textContent = fmt(f.size);

    // Thumbnail: render the first page for PDFs, leave the icon otherwise.
    if(isPdf(f)) previewPdf(f, li.querySelector('.thumb'));

    const rm = li.querySelector('.rm');
    rm.setAttribute('aria-label', `Remove ${f.name}`);
    rm.onclick = () => {
      files.splice(i, 1); refreshOutputName(); drawFiles();
      announce(`Removed ${f.name}`);
      // Focus would be destroyed with the row; put it somewhere sensible.
      (document.querySelector('#fileList .rm') || document.getElementById('drop')).focus();
    };

    const mv = li.querySelector('.mv');
    if(mv){
      mv.setAttribute('aria-label', `Move ${f.name} earlier`);
      mv.disabled = i === 0;
      mv.onclick = () => {
        moveFile(i, i - 1);
        announce(`${f.name} moved to position ${i}`);
        const rows = document.querySelectorAll('#fileList .mv');
        if(rows[i - 1]) rows[i - 1].focus();
      };
    }

    // Pointer drag-to-reorder for multi-file tools. The keyboard ↑ button above
    // stays as the accessible path; drag is an addition, not a replacement.
    if(current.multi){
      li.draggable = true;
      li.addEventListener('dragstart', ev => {
        dragFrom = i; li.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
        // Firefox needs data set for a drag to start at all.
        ev.dataTransfer.setData('text/plain', String(i));
      });
      li.addEventListener('dragend', () => {
        dragFrom = null;
        ul.querySelectorAll('li').forEach(el =>
          el.classList.remove('dragging','dropbefore','dropafter'));
      });
      li.addEventListener('dragover', ev => {
        ev.preventDefault();
        if(dragFrom === null || dragFrom === i){ return; }
        const before = ev.clientY < li.getBoundingClientRect().top + li.offsetHeight / 2;
        li.classList.toggle('dropbefore', before);
        li.classList.toggle('dropafter', !before);
      });
      li.addEventListener('dragleave', () =>
        li.classList.remove('dropbefore','dropafter'));
      li.addEventListener('drop', ev => {
        ev.preventDefault();
        if(dragFrom === null) return;
        const before = ev.clientY < li.getBoundingClientRect().top + li.offsetHeight / 2;
        let to = before ? i : i + 1;
        if(dragFrom < to) to--;          // account for the removed source slot
        moveFile(dragFrom, to);
        announce(`Reordered to position ${to + 1}`);
      });
    }
    ul.append(li);
  });
  const go = document.getElementById('go');
  const need = current.min_files;
  const ready = files.length >= need;
  go.disabled = !ready;
  go.textContent = ready
    ? `Run ${current.name}`
    : (need > 1 ? `Select at least ${need} files` : 'Select a file to begin');
  document.getElementById('fileStatus').textContent =
    files.length ? `${files.length} file${files.length === 1 ? '' : 's'} selected` : '';
  // Show/rebuild the per-page picker for single-PDF page tools (async, fire and
  // forget). It tears itself down when there is no eligible single file.
  syncPagePicker();
}

function announce(msg){ document.getElementById('fileStatus').textContent = msg; }

const fmt = b => b < 1024 ? b + ' B'
  : b < 1048576 ? (b / 1024).toFixed(0) + ' KB'
  : (b / 1048576).toFixed(1) + ' MB';

/* ------------------------------------------------------------ submit --- */
let busy = false;
async function submit(){
  if(busy || !files.length) return;
  busy = true;
  const go = document.getElementById('go');
  const bar = document.getElementById('bar');
  const res = document.getElementById('result');
  go.disabled = true; go.textContent = 'Working…';
  bar.classList.add('on'); res.className = 'result';

  document.getElementById('bar').setAttribute('aria-busy', 'true');

  const fd = new FormData();
  for(const f of files) fd.append('files', f, f.name);
  for(const f of current.fields){
    const el = document.getElementById('f_' + f.name);
    if(!el) continue;
    if(f.kind === 'checkbox'){ if(el.checked) fd.append(f.name, '1'); }
    else if(el.value !== '') fd.append(f.name, el.value);
  }

  try{
    const r = await fetch('/api/t/' + current.key, {method:'POST', body:fd});
    if(!r.ok){
      // FastAPI errors come back as JSON {detail: "..."}; anything else is a
      // proxy or crash and deserves the raw status.
      let msg = 'HTTP ' + r.status;
      try{ const j = await r.json(); if(j.detail) msg = j.detail; }catch{}
      throw new Error(msg);
    }
    const blob = await r.blob();
    const name = filenameOf(r) || (current.key + '.out');
    const url = URL.createObjectURL(blob);
    res.className = 'result on';
    res.innerHTML = `<b></b><small></small><br><a download></a>`;
    res.querySelector('b').textContent = 'Done';
    res.querySelector('small').textContent = `${name} · ${fmt(blob.size)}`;
    const a = res.querySelector('a');
    a.href = url; a.download = name;
    a.textContent = 'Download';
    a.setAttribute('aria-label', `Download ${name}, ${fmt(blob.size)}`);
    a.focus({preventScroll:true});   // the next thing the user wants
    // Revoke on the next navigation rather than on a timer: a short timer can
    // kill the object URL before a slow user clicks it.
    addEventListener('pagehide', () => URL.revokeObjectURL(url), {once:true});
    toast('Finished — ' + name, 'ok');
  }catch(e){
    toast(e.message, 'err');
  }finally{
    busy = false;
    bar.classList.remove('on');
    bar.removeAttribute('aria-busy');
    drawFiles();
  }
}

function filenameOf(r){
  const cd = r.headers.get('content-disposition') || '';
  const m = /filename\*?=(?:UTF-8'')?"?([^";]+)"?/i.exec(cd);
  return m ? decodeURIComponent(m[1]) : null;
}

addEventListener('hashchange', () => {
  const k = location.hash.slice(1);
  if(k && TOOLS.some(t => t.key === k)) open_(k); else home();
});

// Escape returns to the grid from a tool panel -- expected of any overlay-ish
// view, and the only way out for a keyboard user who has tabbed past the back
// button.
addEventListener('keydown', e => {
  if(e.key === 'Escape' && current && !busy) home();
});

syncThemeLabel();
boot().then(() => {
  const k = location.hash.slice(1);
  if(k && TOOLS.some(t => t.key === k)) open_(k);
});
</script>
</body>
